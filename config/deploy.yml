service: srh-iot-api
image: monsterdeveloper/srh-ss26-iot-project

servers:
  web:
    hosts:
      - 161.35.211.185

ssh:
  user: root

registry:
  server: ghcr.io
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  context: .
  args:
    COMMIT_SHA: <%= ENV.fetch("COMMIT_SHA") %>

proxy:
  host: srh-iot-api.ctoofeverything.dev
  ssl: true
  forward_headers: true
  app_port: 8000
  healthcheck:
    path: /health/ready
  response_timeout: 300

deploy_timeout: 300
drain_timeout: 300
stop_timeout: 300
retain_containers: 2

env:
  clear:
    DB_HOST: srh-iot-postgres
    DB_PORT: "5432"
    DB_NAME: srh_iot
    DB_USER: srh_iot
    S3_BUCKET: recordings
    S3_REGION: us-east-1
    S3_PUBLIC_ENDPOINT: https://srh-iot-media.ctoofeverything.dev
    S3_INTERNAL_ENDPOINT: https://srh-iot-media.ctoofeverything.dev:9000
    CORS_ALLOWED_ORIGINS: <%= ENV.fetch("CORS_ALLOWED_ORIGINS") %>
    ROUTE_DISTANCE_M: "14"
    PRESIGNED_URL_TTL_SECONDS: "900"
    EXTRACTION_CONCURRENCY: "1"
  secret:
    - API_BEARER_TOKEN
    - POSTGRES_PASSWORD
    - RUSTFS_ACCESS_KEY
    - RUSTFS_SECRET_KEY

accessories:
  postgres:
    image: postgres:17-alpine
    host: 161.35.211.185
    options:
      network-alias: srh-iot-postgres
    env:
      clear:
        POSTGRES_DB: srh_iot
        POSTGRES_USER: srh_iot
      secret:
        - POSTGRES_PASSWORD
    directories:
      - /srv/srh-iot/postgres:/var/lib/postgresql/data
  rustfs:
    image: rustfs/rustfs:1.0.0-beta.8
    host: 161.35.211.185
    options:
      publish: "9000:9000"
      network-alias: srh-iot-media.ctoofeverything.dev
    env:
      clear:
        RUSTFS_CONSOLE_ENABLE: "false"
        RUSTFS_TLS_PATH: /certs
      secret:
        - RUSTFS_ACCESS_KEY
        - RUSTFS_SECRET_KEY
    directories:
      - /srv/srh-iot/rustfs:/data
      - /srv/srh-iot/rustfs-tls:/certs:ro
