name: Dashboard

on:
  pull_request:
    paths: ["web-dashboard/**", ".github/workflows/dashboard.yml"]

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun format:check
      - run: bun lint
      - run: bun typegen
      - run: bun typecheck
      - run: bun run build
