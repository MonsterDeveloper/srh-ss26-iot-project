name: Deploy production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bootstrap:
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      KAMAL_REGISTRY_USERNAME: ${{ github.actor }}
      KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      COMMIT_SHA: ${{ github.sha }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      RUSTFS_ACCESS_KEY: ${{ secrets.RUSTFS_ACCESS_KEY }}
      RUSTFS_SECRET_KEY: ${{ secrets.RUSTFS_SECRET_KEY }}
      API_BEARER_TOKEN: ${{ secrets.API_BEARER_TOKEN }}
      API_HOST: ${{ vars.API_HOST }}
      S3_HOST: ${{ vars.S3_HOST }}
      CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: ruby/setup-ruby@v1.317.0
        with:
          ruby-version: "3.4"
      - run: gem install kamal -v 2.12.0 --no-document
      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      - name: Configure known hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
        env:
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
      - name: Verify strict SSH connectivity
        run: ssh -o BatchMode=yes -o StrictHostKeyChecking=yes root@161.35.211.185 true
      - uses: docker/setup-buildx-action@v4.2.0
      - name: Prepare accessory storage for bootstrap
        if: github.event_name == 'workflow_dispatch' && inputs.bootstrap
        run: |
          ssh -o BatchMode=yes -o StrictHostKeyChecking=yes root@161.35.211.185 'mkdir -p /srv/srh-iot/postgres /srv/srh-iot/rustfs && chown 10001:10001 /srv/srh-iot/rustfs'
          ssh -o BatchMode=yes -o StrictHostKeyChecking=yes root@161.35.211.185 'test -d /srv/srh-iot/rustfs-tls'
      - name: Bootstrap production
        if: github.event_name == 'workflow_dispatch' && inputs.bootstrap
        run: kamal setup -v
      - name: Deploy production
        if: github.event_name != 'workflow_dispatch' || !inputs.bootstrap
        run: kamal deploy -v
      - name: Release Kamal lock after cancellation
        if: cancelled()
        run: kamal lock release || true
