name: Kamal command
run-name: 🔨 Kamal command in ${{ inputs.env }} by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Kamal command to run"
        required: true
        default: "kamal app details"
      env:
        description: "Environment to use"
        required: true
        default: "production"
      setup_docker_cache:
        description: "Whether to set up Docker cache"
        required: false
        default: "true"

permissions:
  contents: read
  packages: write

jobs:
  command:
    name: Run Kamal command
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.env }}
    env:
      KAMAL_REGISTRY_USERNAME: ${{ github.actor }}
      KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      COMMIT_SHA: ${{ github.sha }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      RUSTFS_ACCESS_KEY: ${{ secrets.RUSTFS_ACCESS_KEY }}
      RUSTFS_SECRET_KEY: ${{ secrets.RUSTFS_SECRET_KEY }}
      API_BEARER_TOKEN: ${{ secrets.API_BEARER_TOKEN }}
      DASHBOARD_API_BEARER_TOKEN: ${{ secrets.DASHBOARD_API_BEARER_TOKEN }}
      CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1.317.0
        with:
          ruby-version: "3.4"

      - name: Setup Kamal
        run: gem install kamal -v 2.12.0 --no-document

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Configure known hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
        env:
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}

      - name: Verify strict SSH connectivity
        run: ssh -o BatchMode=yes -o StrictHostKeyChecking=yes root@161.35.211.185 true

      - name: Set up Docker cache
        if: ${{ inputs.setup_docker_cache == 'true' }}
        uses: docker/setup-buildx-action@v4.2.0

      - name: Run Kamal command
        run: ${{ inputs.command }}
